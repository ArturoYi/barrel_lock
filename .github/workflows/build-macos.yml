name: Build macOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.44.2
  MELOS_VERSION: ^8.0.0

jobs:
  build-macos:
    name: Build macOS (release)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos ${{ env.MELOS_VERSION }}

      - name: Add melos to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Cache pub
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-macos-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-macos-${{ runner.os }}-

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build macOS
        run: melos run build:macos

      - name: Collect build outputs
        run: |
          mkdir -p melos_outputs/macos
          melos exec --scope=barrel_lock_macos -- \
            cp -r build/macos/Build/Products/Release melos_outputs/macos/ || true

      - name: Zip macOS app
        run: |
          cd melos_outputs/macos
          if [ -d "Release" ]; then
            zip -r barrel_lock_macos.zip Release
          fi

      - name: Upload macOS app
        uses: actions/upload-artifact@v7
        with:
          name: macos-app
          path: melos_outputs/macos/*.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: melos_outputs/macos/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
