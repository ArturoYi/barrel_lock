name: Build iOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.44.2
  MELOS_VERSION: ^8.0.0

jobs:
  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos ${{ env.MELOS_VERSION }}

      - name: Add melos to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Cache pub
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
            **/ios/Pods/
          key: pub-ios-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-ios-${{ runner.os }}-

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build iOS (no-codesign)
        run: melos run build:ios

      - name: Collect build outputs
        run: |
          mkdir -p melos_outputs/ios
          melos exec --scope=barrel_lock_ios -- \
            cp -r build/ios/iphoneos melos_outputs/ios/ || true

      - name: Upload iOS app
        uses: actions/upload-artifact@v7
        with:
          name: ios-app
          path: melos_outputs/ios/
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: melos_outputs/ios/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
