name: Build Web

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: build-web-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.2
  MELOS_VERSION: ^8.0.0

jobs:
  build-web:
    name: Build Web (release)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos ${{ env.MELOS_VERSION }}

      - name: Add melos to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-web-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-web-${{ runner.os }}-

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build Web
        run: melos run build:web

      - name: Collect build outputs
        run: |
          mkdir -p melos_outputs/web
          melos exec --scope=barrel_lock_web -- \
            cp -r build/web melos_outputs/web/

      - name: Upload Web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: melos_outputs/web/
          if-no-files-found: warn
          retention-days: 14

      - name: Deploy to GitHub Pages (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: melos_outputs/web/web/

      - name: Publish GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v4
