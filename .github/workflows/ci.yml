name: CI

on:
  push:
    branches: [main] # develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.2
  MELOS_VERSION: ^8.0.0

jobs:
  quality:
    name: Quality Gate (format · analyze · test)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (FVM pinned)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos ${{ env.MELOS_VERSION }}

      - name: Add melos to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install workspace dependencies
        # pub workspaces 模式下,根目录跑一次 `dart pub get` 即可解析所有子包;
        # 用 `melos bootstrap` 会并发触发 `flutter pub get`,导致 startup lock 冲突。
        run: dart pub get

      - name: Aggregate quality gate
        run: melos run ci --no-select

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7
