name: fast_lifecycle
description: >-
  全平台原生生命周期监听框架。透传各端系统原生事件，不做状态抹平；
  统一 EventChannel / 门面分层，支持桌面多窗口隔离。
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.flutterbazaar.fast_lifecycle
        pluginClass: FastLifecyclePlugin
      ios:
        pluginClass: FastLifecyclePlugin
      macos:
        pluginClass: FastLifecyclePlugin
      # TODO: Windows 原生插件待单独实现后再注册
      linux:
        pluginClass: FastLifecyclePlugin
