name: core
description: Shared core library for Flutter Bazaar.
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  app_fonts:
    path: ../app_fonts
  cryptography: ^2.9.0
  cryptography_flutter: ^2.3.4
  crypto: ^3.0.7
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  device_info_plus: ^13.2.0
  file_picker: ^12.0.0-beta.7
  fast_dialog:
    path: ../fast_dialog
  fast_loading:
    path: ../fast_loading
  fast_navigator:
    path: ../fast_navigator
  fast_package: ^0.0.3
  fast_toast:
    path: ../fast_toast
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  local_auth_darwin: ^1.4.2
  package_info_plus: ^10.2.0
  path_provider: ^2.1.5
  share_plus: ^13.2.1
  shared_preferences: ^2.5.5
  uuid: ^4.5.0

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.34.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

