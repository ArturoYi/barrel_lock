name: flutter_bazaar
description: Flutter Bazaar monorepo managed by Melos.
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: ">=3.27.0"

workspace:
  - apps/BarrelLock/BarrelLock_android
  - apps/BarrelLock/BarrelLock_ios
  - apps/BarrelLock/BarrelLock_windows
  - apps/BarrelLock/BarrelLock_linux
  - apps/BarrelLock/BarrelLock_web
  - apps/BarrelLock/BarrelLock_macos
  - packages/app_fonts
  - packages/core
  - packages/fast_navigator

dev_dependencies:
  melos: ^8.0.0
  flutter_lints: ^6.0.0

# Melos 8.0.0 + Dart pub workspaces 管理方式:
# - 所有 melos 配置(包含 scripts / ide / command / sdkPath)都在 pubspec.yaml 的 melos: 块内。
# - 根 pubspec.yaml 用 workspace: 列出子包,各子包 pubspec.yaml 用 resolution: workspace 引用。
# - 不再需要单独的 melos.yaml 文件。
melos:
  # SDK 路径由各环境自行提供:
  #   - 本地:FVM 把当前版本软链进 PATH(fvm use)
  #   - CI:subosito/flutter-action 自动安装 Flutter 到 PATH
  # 也可通过 MELOS_SDK_PATH 环境变量或 --sdk-path 命令行参数显式覆盖。

  # 为 IntelliJ/Android Studio 生成 Run/Debug 配置,自动收录每个子包的 main 入口。
  ide:
    intellij: true

  # CI 与本地统一使用 `dart pub get`(pub workspaces 自动给所有子包解析),
  # 不再调用 melos bootstrap(它会并发 flutter pub get,触发 startup lock 冲突)。
  command:
    bootstrap:
      runPubGetInParallel: false

  scripts:
    # ── 质量门禁 ────────────────────────────────────────────
    # 使用 `lib` 替代 `lib test`, 因为部分包可能没有 `test` 目录, `dart analyze` 会报错。
    # 根目录的 pubspec.yaml 中定义了 workspaces, `dart analyze .` 其实能很好的工作。
    # 但为了避免之前 `lib/main.dart` 找不到的问题，我们可以利用 melos 过滤。
    analyze:
      description: Run `dart analyze` across all packages.
      exec:
        command: dart analyze .
        concurrency: 1

    analyze:fix:
      description: Auto-apply Dart analyzer suggestions.
      exec:
        command: dart fix --apply .
        concurrency: 1

    format:
      description: Format Dart code in all packages.
      exec:
        command: dart format .
        concurrency: 1

    format:check:
      description: Verify formatting without modifying files (CI-friendly).
      exec:
        command: dart format --output=none --set-exit-if-changed .
        concurrency: 1

    # 纯 Dart / Flutter 库测试(core / fast_navigator 等),用 dart test 即可。
    test:dart:
      description: Run `flutter test` for Flutter library packages.
      exec:
        command: flutter test --no-pub --reporter=expanded
        concurrency: 1
      packageFilters:
        dirExists: test
        scope:
          - "*core*"
          - "*fast_navigator*"

    test:
      description: Aggregate test runner for library packages.
      run: dart pub global run melos run test:dart

    test:coverage:
      description: Run tests and collect coverage data into coverage/.
      run: dart pub global run melos run test:dart

    # ── 聚合门禁(供 CI 一键调用,只在工作区根执行一次) ─────
    ci:
      description: "Aggregate quality gate: format check -> analyze -> test."
      run: dart pub global run melos run format:check && dart pub global run melos run analyze && dart pub global run melos run test

    # ── BarrelLock App:运行 ──────────────────────────────────
    run:android:
      description: Run BarrelLock Android app.
      exec:
        command: flutter run -d android
        scope: barrel_lock_android

    run:ios:
      description: Run BarrelLock iOS app.
      exec:
        command: flutter run -d ios
        scope: barrel_lock_ios

    run:macos:
      description: Run BarrelLock macOS app.
      exec:
        command: flutter run -d macos
        scope: barrel_lock_macos

    run:windows:
      description: Run BarrelLock Windows app.
      exec:
        command: flutter run -d windows
        scope: barrel_lock_windows

    run:linux:
      description: Run BarrelLock Linux app.
      exec:
        command: flutter run -d linux
        scope: barrel_lock_linux

    run:web:
      description: Run BarrelLock Web app.
      exec:
        command: flutter run -d chrome
        scope: barrel_lock_web

    # ── BarrelLock App:构建(产物统一到 melos_outputs/) ─────
    build:android:
      description: Build release APK for BarrelLock Android.
      exec:
        command: flutter build apk --release
        scope: barrel_lock_android
        orderDependents: true

    build:android:bundle:
      description: Build release AAB for BarrelLock Android (Play Store).
      exec:
        command: flutter build appbundle --release
        scope: barrel_lock_android

    build:ios:
      description: Build BarrelLock iOS (no codesign).
      exec:
        command: flutter build ios --release --no-codesign
        scope: barrel_lock_ios

    build:macos:
      description: Build BarrelLock macOS release.
      exec:
        command: flutter build macos --release
        scope: barrel_lock_macos

    build:windows:
      description: Build BarrelLock Windows release.
      exec:
        command: flutter build windows --release
        scope: barrel_lock_windows

    build:linux:
      description: Build BarrelLock Linux release.
      exec:
        command: flutter build linux --release
        scope: barrel_lock_linux

    build:web:
      description: Build BarrelLock Web release.
      exec:
        command: flutter build web --release
        scope: barrel_lock_web

    # ── 清理 ─────────────────────────────────────────────────
    clean:
      description: Run `flutter clean` in every package.
      exec:
        command: flutter clean
        concurrency: 1

    clean:full:
      description: "Aggressive clean: flutter clean + remove build outputs and .dart_tool."
      run: melos exec -- flutter clean && rm -rf build/ melos_outputs/ .dart_tool/
