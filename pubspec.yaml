name: flutter_bazaar
description: Flutter Bazaar monorepo managed by Melos.
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: ">=3.27.0"

workspace:
  - apps/BarrelLock/BarrelLock_android
  - apps/BarrelLock/BarrelLock_ios
  - apps/BarrelLock/BarrelLock_windows
  - apps/BarrelLock/BarrelLock_linux
  - apps/BarrelLock/BarrelLock_web
  - apps/BarrelLock/BarrelLock_macos
  - packages/core
  - packages/fast_navigator

dev_dependencies:
  melos: ^7.0.0

melos:
  scripts:
    analyze:
      run: melos exec -- dart analyze .
      description: Run static analysis on all packages.
    test:
      run: melos exec -- flutter test
      description: Run tests in all packages.
    format:
      run: melos exec -- dart format .
      description: Format Dart code in all packages.
    run:android:
      run: melos exec --scope="barrel_lock_android" -- flutter run -d android
      description: Run BarrelLock Android app.
    run:ios:
      run: melos exec --scope="barrel_lock_ios" -- flutter run -d ios
      description: Run BarrelLock iOS app.
    run:windows:
      run: melos exec --scope="barrel_lock_windows" -- flutter run -d windows
      description: Run BarrelLock Windows app.
    run:linux:
      run: melos exec --scope="barrel_lock_linux" -- flutter run -d linux
      description: Run BarrelLock Linux app.
    run:web:
      run: melos exec --scope="barrel_lock_web" -- flutter run -d chrome
      description: Run BarrelLock Web app.
    run:macos:
      run: melos exec --scope="barrel_lock_macos" -- flutter run -d macos
      description: Run BarrelLock macOS app.
    build:android:
      run: melos exec --scope="barrel_lock_android" -- flutter build apk
      description: Build BarrelLock Android app.
    build:ios:
      run: melos exec --scope="barrel_lock_ios" -- flutter build ios
      description: Build BarrelLock iOS app.
    build:windows:
      run: melos exec --scope="barrel_lock_windows" -- flutter build windows
      description: Build BarrelLock Windows app.
    build:linux:
      run: melos exec --scope="barrel_lock_linux" -- flutter build linux
      description: Build BarrelLock Linux app.
    build:web:
      run: melos exec --scope="barrel_lock_web" -- flutter build web
      description: Build BarrelLock Web app.
    build:macos:
      run: melos exec --scope="barrel_lock_macos" -- flutter build macos
      description: Build BarrelLock macOS app.
